<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none" role="img" aria-label="Tori logo">
  <defs>
    <linearGradient id="tg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <clipPath id="tshape">
      <!-- T horizontal bar -->
      <rect x="3" y="5" width="34" height="9.5" rx="4.5"/>
      <!-- T vertical stem — starts at same y as bar so they fuse seamlessly -->
      <rect x="15.5" y="5" width="9" height="30" rx="4.5"/>
    </clipPath>
  </defs>
  <!-- Single gradient fill clipped to T shape -->
  <rect x="0" y="0" width="40" height="40" fill="url(#tg)" clip-path="url(#tshape)"/>
  <!-- AI spark cluster at top-right -->
  <circle cx="35.5" cy="5.8" r="2" fill="#C4B5FD" opacity="0.9"/>
  <circle cx="38.8" cy="11.5" r="1.3" fill="#C4B5FD" opacity="0.55"/>
  <circle cx="37.5" cy="3.2" r="0.85" fill="#C4B5FD" opacity="0.45"/>
</svg>
